<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI-Assisted Projects · Amazon Kiro</title>
 <style>
    *, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

:root {
  --navy: #0d1f3c;
  --blue: #1a56db;
  --blue-light: #e8f0fe;
  --blue-hover: #1446c0;
  --text: #1a1a2e;
  --muted: #5a6478;
  --border: #e2e8f0;
  --white: #ffffff;
  --card-shadow: 0 2px 12px rgba(13, 31, 60, 0.08);
  --card-shadow-hover: 0 8px 28px rgba(13, 31, 60, 0.14);
}

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, sans-serif;
  background: var(--white);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

/* ── Header ── */
header {
  background: var(--navy);
  color: var(--white);
  padding: 72px 24px 64px;
  text-align: center;
}

.header-inner {
  max-width: 680px;
  margin: 0 auto;
}

.kiro-badge {
  display: inline-block;
  background: var(--blue);
  color: var(--white);
  font-size: 0.75rem;
  font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  padding: 4px 12px;
  border-radius: 20px;
  margin-bottom: 20px;
}

header h1 {
  font-size: clamp(2rem, 5vw, 3rem);
  font-weight: 700;
  letter-spacing: -0.02em;
  line-height: 1.15;
  margin-bottom: 14px;
}

.subtitle {
  font-size: 1.05rem;
  color: #a8bbd4;
  line-height: 1.6;
}

/* ── Main / Cards ── */
main {
  flex: 1;
  padding: 64px 24px;
}

.projects {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 28px;
  max-width: 1080px;
  margin: 0 auto;
}

.card {
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 36px 28px 32px;
  display: flex;
  flex-direction: column;
  align-items: flex-start;
  box-shadow: var(--card-shadow);
  transition: transform 0.2s ease, box-shadow 0.2s ease;
}

.card:hover {
  transform: translateY(-4px);
  box-shadow: var(--card-shadow-hover);
}

.card-emoji {
  font-size: 2.4rem;
  margin-bottom: 18px;
  line-height: 1;
}

.card h2 {
  font-size: 1.15rem;
  font-weight: 700;
  color: var(--navy);
  margin-bottom: 12px;
  line-height: 1.3;
}

.card p {
  font-size: 0.95rem;
  color: var(--muted);
  line-height: 1.65;
  flex: 1;
  margin-bottom: 28px;
}

.btn {
  display: inline-block;
  background: var(--blue);
  color: var(--white);
  text-decoration: none;
  font-size: 0.875rem;
  font-weight: 600;
  padding: 10px 22px;
  border-radius: 8px;
  transition: background 0.18s ease;
}

.btn:hover {
  background: var(--blue-hover);
}

/* ── Footer ── */
footer {
  background: var(--navy);
  color: #a8bbd4;
  text-align: center;
  padding: 32px 24px;
  font-size: 0.9rem;
}

footer p {
  margin-bottom: 8px;
  font-weight: 500;
  color: var(--white);
}

.footer-links {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 10px;
}

.footer-links a {
  color: #a8bbd4;
  text-decoration: none;
  transition: color 0.18s ease;
}

.footer-links a:hover {
  color: var(--white);
}

.divider {
  color: #4a5a72;
}

/* ── Responsive ── */
@media (max-width: 600px) {
  header {
    padding: 52px 20px 44px;
  }

  main {
    padding: 44px 16px;
  }

  .projects {
    grid-template-columns: 1fr;
  }

  .card {
    padding: 28px 22px 26px;
  }
}

</html>
